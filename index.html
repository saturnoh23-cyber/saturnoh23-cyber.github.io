<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Hanami Reads - Test</title>
<style>
body { font-family: sans-serif; background: #fff5f7; color: #4a1e30; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
button { background: #ff8fab; border: none; padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; margin: 5px; }
input, textarea { border: 1.5px solid #ffc2d4; border-radius: 10px; padding: 8px; width: 100%; margin: 5px 0; box-sizing: border-box; }
.card { background: #fff5f7; border: 1.5px solid #ffc2d4; border-radius: 14px; padding: 15px; margin-bottom: 10px; }
h1 { color: #e05f85; font-family: serif; }
</style>
</head>
<body>
<div class="container">
  <h1>🌸 Hanami Reads</h1>
  <p>Haz click en "Probar conexión" para verificar que todo funciona.</p>
  <button onclick="testConnection()">✅ Probar conexión</button>
  <button onclick="addTestBook()">➕ Probar añadir libro</button>
  <div id="output"></div>
</div>

<script>
// Función de prueba
function testConnection() {
  document.getElementById('output').innerHTML = '<div class="card">✅ ¡La página funciona correctamente!<br>Ahora necesito tu código original completo para arreglar las portadas.</div>';
}

function addTestBook() {
  let books = [];
  try {
    books = JSON.parse(localStorage.getItem('tbr-manga-books') || '[]');
  } catch(e) {}
  
  const newId = Date.now();
  books.push({ id: newId, title: 'Libro de prueba ' + new Date().toLocaleTimeString(), priority: false, addedAt: new Date().toISOString() });
  localStorage.setItem('tbr-manga-books', JSON.stringify(books));
  
  document.getElementById('output').innerHTML = '<div class="card">✅ Libro añadido correctamente a localStorage<br>Total de libros: ' + books.length + '</div>';
}
</script>
</body>
