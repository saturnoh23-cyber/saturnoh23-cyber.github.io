<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe4f0"/>
    </radialGradient>
    <radialGradient id="petal" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffc2d9"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#ffb3d1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background square with soft rounded corners -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Subtle texture dots -->
  <circle cx="80" cy="80" r="5" fill="#ffb3d1" opacity="0.25"/>
  <circle cx="430" cy="80" r="5" fill="#ffb3d1" opacity="0.25"/>
  <circle cx="80" cy="430" r="5" fill="#ffb3d1" opacity="0.25"/>
  <circle cx="430" cy="430" r="5" fill="#ffb3d1" opacity="0.25"/>
  <circle cx="256" cy="60" r="4" fill="#ffb3d1" opacity="0.2"/>
  <circle cx="256" cy="452" r="4" fill="#ffb3d1" opacity="0.2"/>
  <circle cx="60" cy="256" r="4" fill="#ffb3d1" opacity="0.2"/>
  <circle cx="452" cy="256" r="4" fill="#ffb3d1" opacity="0.2"/>

  <!-- 5 cherry blossom petals -->
  <g filter="url(#shadow)">
    <path d="M256,256 C236,218 198,192 209,155 C220,122 256,110 256,110 C256,110 292,122 303,155 C314,192 276,218 256,256 Z" fill="url(#petal)" stroke="#ffc2d9" stroke-width="2"/>
    <path d="M256,256 C236,218 198,192 209,155 C220,122 256,110 256,110 C256,110 292,122 303,155 C314,192 276,218 256,256 Z" fill="url(#petal)" stroke="#ffc2d9" stroke-width="2" transform="rotate(72 256 256)"/>
    <path d="M256,256 C236,218 198,192 209,155 C220,122 256,110 256,110 C256,110 292,122 303,155 C314,192 276,218 256,256 Z" fill="url(#petal)" stroke="#ffc2d9" stroke-width="2" transform="rotate(144 256 256)"/>
    <path d="M256,256 C236,218 198,192 209,155 C220,122 256,110 256,110 C256,110 292,122 303,155 C314,192 276,218 256,256 Z" fill="url(#petal)" stroke="#ffc2d9" stroke-width="2" transform="rotate(216 256 256)"/>
    <path d="M256,256 C236,218 198,192 209,155 C220,122 256,110 256,110 C256,110 292,122 303,155 C314,192 276,218 256,256 Z" fill="url(#petal)" stroke="#ffc2d9" stroke-width="2" transform="rotate(288 256 256)"/>
  </g>

  <!-- Petal veins -->
  <g stroke="#ffb3d1" stroke-width="1.5" opacity="0.5" fill="none">
    <line x1="256" y1="248" x2="256" y2="138"/>
    <line x1="256" y1="248" x2="256" y2="138" transform="rotate(72 256 256)"/>
    <line x1="256" y1="248" x2="256" y2="138" transform="rotate(144 256 256)"/>
    <line x1="256" y1="248" x2="256" y2="138" transform="rotate(216 256 256)"/>
    <line x1="256" y1="248" x2="256" y2="138" transform="rotate(288 256 256)"/>
  </g>

  <!-- Center -->
  <circle cx="256" cy="256" r="42" fill="url(#center)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#fde68a" stroke-width="2"/>

  <!-- Stamens -->
  <g stroke="#ffb3d1" stroke-width="2" stroke-linecap="round">
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(0 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(40 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(80 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(120 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(160 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(200 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(240 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(280 256 256)"/>
    <line x1="256" y1="254" x2="256" y2="228" transform="rotate(320 256 256)"/>
  </g>
  <g fill="#ffb3d1">
    <circle cx="256" cy="228" r="4.5" transform="rotate(0 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(40 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(80 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(120 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(160 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(200 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(240 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(280 256 256)"/>
    <circle cx="256" cy="228" r="4.5" transform="rotate(320 256 256)"/>
  </g>
</svg>
